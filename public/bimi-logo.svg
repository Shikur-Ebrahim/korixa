<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-label="Korixa">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a12"/>
      <stop offset="100%" stop-color="#0d0d1a"/>
    </linearGradient>
    <linearGradient id="kTop" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00E5FF"/>
      <stop offset="100%" stop-color="#0080FF"/>
    </linearGradient>
    <linearGradient id="kBottom" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5B2EFF"/>
      <stop offset="100%" stop-color="#9B30FF"/>
    </linearGradient>
    <linearGradient id="kMid" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00B8D4"/>
      <stop offset="100%" stop-color="#7B1FFF"/>
    </linearGradient>
  </defs>
  <!-- Black background -->
  <rect width="256" height="256" rx="40" fill="url(#bg)"/>

  <!-- K left vertical bar (top half - cyan) -->
  <polygon points="48,36 80,36 80,128 48,128" fill="url(#kTop)"/>
  <!-- K left vertical bar (bottom half - purple) -->
  <polygon points="48,128 80,128 80,220 48,220" fill="url(#kBottom)"/>

  <!-- K top-right arm (cyan to blue diagonal) -->
  <polygon points="80,128 80,90 200,36 200,74" fill="url(#kTop)"/>

  <!-- K center arrow point (mid gradient) -->
  <polygon points="80,128 130,90 130,166" fill="url(#kMid)"/>

  <!-- K bottom-right arm (purple diagonal) -->
  <polygon points="80,128 80,166 200,220 200,182" fill="url(#kBottom)"/>

  <!-- Candlestick chart overlay on top-right arm -->
  <rect x="148" y="56" width="5" height="28" rx="1" fill="#00E5FF" opacity="0.9"/>
  <rect x="148" y="50" width="5" height="8" rx="1" fill="#00E5FF" opacity="0.5"/>
  <rect x="160" y="48" width="5" height="22" rx="1" fill="#CC44FF" opacity="0.9"/>
  <rect x="160" y="42" width="5" height="8" rx="1" fill="#CC44FF" opacity="0.5"/>
  <rect x="172" y="40" width="5" height="30" rx="1" fill="#00E5FF" opacity="0.9"/>
  <rect x="172" y="34" width="5" height="8" rx="1" fill="#00E5FF" opacity="0.5"/>
</svg>
